{% extends 'dashboard/profile/base.html' %}
{% load static %}
{% block profileContent %}
  <!-- begin::Basic info -->
  <div class="card mb-5 mb-xl-10">
    <!-- begin::Card header -->
    <div class="card-header border-0 cursor-pointer" role="button" data-bs-toggle="collapse" data-bs-target="#kt_account_profile_details" aria-expanded="true" aria-controls="kt_account_profile_details">
      <!-- begin::Card title -->
      <div class="card-title m-0">
        <h3 class="fw-bold m-0">Profile Details</h3>
      </div>
      <!-- end::Card title -->
    </div>
    <!-- begin::Card header -->
    <!-- begin::Content -->
    <div id="kt_account_settings_profile_details" class="collapse show">
      <!-- begin::Form -->
      <form id="kt_account_profile_details_form" class="form" method="post" enctype="multipart/form-data" action="/admin/settings/">
        {% csrf_token %}
        <!-- begin::Card body -->
        <div class="card-body border-top p-9">
          <!-- begin::Input group -->
          <div class="row mb-6">
            <!-- begin::Label -->
            <label class="col-lg-4 col-form-label fw-semibold fs-6">Avatar</label>
            <!-- end::Label -->
            <!-- begin::Col -->
            <div class="col-lg-8">
              <!-- begin::Image input -->
              <div class="image-input image-input-outline" data-kt-image-input="true" style="background-image: url('{% static 'assets/media/avatars/blank.png' %}')">
                <!-- begin::Preview existing avatar -->
                <div class="image-input-wrapper w-125px h-125px" style="background-image: url(/media/{{ request.user.profile_pic }})"></div>
                <!-- end::Preview existing avatar -->
                <!-- begin::Label -->
                <label class="btn btn-icon btn-circle btn-active-color-primary w-25px h-25px bg-body shadow" data-kt-image-input-action="change" data-bs-toggle="tooltip" title="Change avatar">
                  <i class="ki-duotone ki-pencil fs-7">
                    <span class="path1"></span>
                    <span class="path2"></span>
                  </i>
                  <!-- begin::Inputs -->
                  <input type="file" name="avatar" accept=".png, .jpg, .jpeg" />
                  <input type="hidden" name="avatar_remove" />
                  <!-- end::Inputs -->
                </label>
                <!-- end::Label -->
                <!-- begin::Cancel -->
                <span class="btn btn-icon btn-circle btn-active-color-primary w-25px h-25px bg-body shadow" data-kt-image-input-action="cancel" data-bs-toggle="tooltip" title="Cancel avatar">
                  <i class="ki-duotone ki-cross fs-2">
                    <span class="path1"></span>
                    <span class="path2"></span>
                  </i>
                </span>
                <!-- end::Cancel -->
                <!-- begin::Remove -->
                <span class="btn btn-icon btn-circle btn-active-color-primary w-25px h-25px bg-body shadow" data-kt-image-input-action="remove" data-bs-toggle="tooltip" title="Remove avatar">
                  <i class="ki-duotone ki-cross fs-2">
                    <span class="path1"></span>
                    <span class="path2"></span>
                  </i>
                </span>
                <!-- end::Remove -->
              </div>
              <!-- end::Image input -->
              <!-- begin::Hint -->
              <div class="form-text">Allowed file types: png, jpg, jpeg.</div>
              <!-- end::Hint -->
            </div>
            <!-- end::Col -->
          </div>
          <!-- end::Input group -->
          <!-- begin::Input group -->
          <div class="row mb-6">
            <!-- begin::Label -->
            <label class="col-lg-4 col-form-label required fw-semibold fs-6">Full Name</label>
            <!-- end::Label -->
            <!-- begin::Col -->
            <div class="col-lg-8">
              <!-- begin::Row -->
              <div class="row">
                <!-- begin::Col -->
                <div class="col-lg-6 fv-row">
                  <input type="text" name="fname" class="form-control form-control-lg form-control-solid mb-3 mb-lg-0" placeholder="First name" value="{{ request.user.first_name }}" />
                </div>
                <!-- end::Col -->
                <!-- begin::Col -->
                <div class="col-lg-6 fv-row">
                  <input type="text" name="lname" class="form-control form-control-lg form-control-solid" placeholder="Last name" value="{{ request.user.last_name }}" />
                </div>
                <!-- end::Col -->
              </div>
              <!-- end::Row -->
            </div>
            <!-- end::Col -->
          </div>
          <!-- end::Input group -->
          <!-- begin::Input group -->
          <div class="row mb-6">
            <!-- begin::Label -->
            <label class="col-lg-4 col-form-label required fw-semibold fs-6">Address</label>
            <!-- end::Label -->
            <!-- begin::Col -->
            <div class="col-lg-8 fv-row">
              <input type="text" name="address" class="form-control form-control-lg form-control-solid" placeholder="Complete Address" value="{{ request.user.address }}" />
            </div>
            <!-- end::Col -->
          </div>
          <!-- end::Input group -->
          <!-- begin::Input group -->
          <div class="row mb-6">
            <!-- begin::Label -->
            <label class="col-lg-4 col-form-label fw-semibold fs-6">
              <span class="required">Contact Phone</span>
              <span class="ms-1" data-bs-toggle="tooltip" title="Phone number must be active">
                <i class="ki-duotone ki-information-5 text-gray-500 fs-6">
                  <span class="path1"></span>
                  <span class="path2"></span>
                  <span class="path3"></span>
                </i>
              </span>
            </label>
            <!-- end::Label -->
            <!-- begin::Col -->
            <div class="col-lg-8 fv-row">
              <input type="tel" name="phone" class="form-control form-control-lg form-control-solid" placeholder="Phone number" value="{{ request.user.mobile_number }}" />
            </div>
            <!-- end::Col -->
          </div>
          <!-- end::Input group -->
          <!-- begin::Input group -->
          <div class="row mb-6">
            <!-- begin::Label -->
            <label class="col-lg-4 col-form-label fw-semibold fs-6">Email</label>
            <!-- end::Label -->
            <!-- begin::Col -->
            <div class="col-lg-8 fv-row">
              <input type="text" name="email" class="form-control form-control-lg form-control-solid" placeholder="Enter Email" value="{{ request.user.email }}" />
            </div>
            <!-- end::Col -->
          </div>
          <!-- end::Input group -->
          <!-- begin::Input group -->
          <div class="row mb-6">
            <!-- begin::Label -->
            <label class="col-lg-4 col-form-label fw-semibold fs-6">CNIC</label>
            <!-- end::Label -->
            <!-- begin::Col -->
            <div class="col-lg-8 fv-row">
              <input type="text" name="cnic" class="form-control form-control-lg form-control-solid" placeholder="CNIC" value="{{ request.user.cnic }}" />
            </div>
            <!-- end::Col -->
          </div>
          <!-- end::Input group -->
        </div>
        <!-- end::Card body -->
        <!-- begin::Actions -->
        <div class="card-footer d-flex justify-content-end py-6 px-9">
          <button type="reset" class="btn btn-light btn-active-light-primary me-2">Discard</button>
          <button type="submit" class="btn btn-primary" id="kt_account_profile_details_submit">Save Changes</button>
        </div>
        <!-- end::Actions -->
      </form>
      <!-- end::Form -->
    </div>
    <!-- end::Content -->
  </div>
  <!-- end::Basic info -->
{% endblock %}
