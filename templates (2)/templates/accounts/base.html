{% load static %}
<!DOCTYPE html>
<html lang="en">
	<!--begin::Head-->
	<head>
		<title>{% block title %}{% endblock %}</title>
		<meta charset="utf-8" />
		<meta name="description" content="Tyre Stock Management System for auto shops to manage tyre purchases, customer sales, stock levels, expenses, and billing with full dashboard analytics. Ideal for tyre dealers, wholesalers, and retailers. Built using Django and Bootstrap." />
		<meta name="keywords" content="tyre management, stock system, tyre shop software, Django admin panel, inventory tracking, tyre billing, auto shop management, tyre POS, tyre stock control, tyre sales dashboard, tyre shop accounting, tyre retail software" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="shortcut icon" href="{% static 'assets/media/logos/favicon.ico' %}" />
		<!--begin::Fonts(mandatory for all pages)-->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:300,400,500,600,700" />
		<!--end::Fonts-->
		<!--begin::Global Stylesheets Bundle(mandatory for all pages)-->
		<link href="{% static 'assets/plugins/global/plugins.bundle.css' %}" rel="stylesheet" type="text/css" />
		<link href="{% static 'assets/css/style.bundle.css' %}" rel="stylesheet" type="text/css" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

		<!--end::Global Stylesheets Bundle-->

        {% block extraStyle %}{% endblock %}
	</head>
	<!--end::Head-->
	<!--begin::Body-->
	<body id="kt_body" class="auth-bg bgi-size-cover bgi-attachment-fixed bgi-position-center">
		<!--begin::Theme mode setup on page load-->
		<script>var defaultThemeMode = "light"; var themeMode; if ( document.documentElement ) { if ( document.documentElement.hasAttribute("data-bs-theme-mode")) { themeMode = document.documentElement.getAttribute("data-bs-theme-mode"); } else { if ( localStorage.getItem("data-bs-theme") !== null ) { themeMode = localStorage.getItem("data-bs-theme"); } else { themeMode = defaultThemeMode; } } if (themeMode === "system") { themeMode = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"; } document.documentElement.setAttribute("data-bs-theme", themeMode); }</script>
		<!--end::Theme mode setup on page load-->
		<!--begin::Main-->
		

        {% block bodyContent %}{% endblock %}


        
		<!--end::Main-->
		<!--begin::Javascript-->
		<script>var hostUrl = "assets/";</script>
		<!--begin::Global Javascript Bundle(mandatory for all pages)-->
		<script src="{% static 'assets/plugins/global/plugins.bundle.js' %}"></script>
		<script src="{% static 'assets/js/scripts.bundle.js' %}"></script>
		<!--end::Global Javascript Bundle-->
		<!--begin::Custom Javascript(used for this page only)-->
		<script src="{% static 'assets/js/custom/authentication/sign-in/general.js' %}"></script>
		<!--end::Custom Javascript-->
		<!--end::Javascript-->
        <script src="https://unpkg.com/htmx.org@1.9.2"></script>
        <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("submit-form");
            const button = document.getElementById("submit-btn");

            form.addEventListener("submit", function () {
                button.disabled = true;
                button.innerHTML = `
                     <span style="display: inline-flex; align-items: center; gap: 8px;">
                    <img class="fa-spin" src="{% static 'assets/media/auth/wheel.png' %}" alt="Loading..." style="width: 24px; height: 24px;" />
                    <span>Please wait...</span>
                </span>
                `;
            });
        });
        </script>



        {% block extraScript %}{% endblock %}
	</body>
	<!--end::Body-->
</html>
