              <ul class="sub-menu">
                <li>
                  <a href="{% url 'user_entry' %}">My Account</a>

                <li>
                  <a href="/accounts/logout/">Logout</a>
                </li>
              </ul>
            {% else %}
              <ul class="sub-menu">
                <li>

</header>

<script>
  ;(function () {
    const currentPath = window.location.pathname.replace(/\/$/, '')
  
    document.querySelectorAll('ul li a[href]').forEach((link) => {
      let linkPath = link.getAttribute('href')
  
      if (!linkPath || linkPath === 'javascript:void(0)') return
  
      linkPath = linkPath.replace(/\/$/, '')
  
      // Match exact path
      if (linkPath === currentPath) {
        link.classList.add('active')
  
        const li = link.closest('li')
        if (li) li.classList.add('active')
  
        // If inside submenu, activate parent menu too
        const parentSubMenu = link.closest('.sub-menu')
        if (parentSubMenu) {
          const parentLi = parentSubMenu.closest('li')
          if (parentLi) parentLi.classList.add('active')
        }
      }
    })
  })()
</script>
