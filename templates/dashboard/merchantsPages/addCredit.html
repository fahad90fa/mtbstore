<!-- begin::Modal - New Target -->
<div class="modal fade" id="kt_modal_add_credit" tabindex="-1" aria-hidden="true">
  <!-- begin::Modal dialog -->
  <div class="modal-dialog modal-dialog-centered mw-650px">
    <!-- begin::Modal content -->
    <div class="modal-content rounded">
      <!-- begin::Modal header -->
      <div class="modal-header pb-0 border-0 justify-content-end">
        <!-- begin::Close -->
        <div class="btn btn-sm btn-icon btn-active-color-primary" data-bs-dismiss="modal">
          <i class="ki-duotone ki-cross fs-1">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
        </div>
        <!-- end::Close -->
      </div>
      <!-- begin::Modal header -->
      <!-- begin::Modal body -->
      <div class="modal-body scroll-y px-10 px-lg-15 pt-0 pb-15">
        <!-- begin:Form -->
        <form id="kt_modal_new_target_form" class="form" method="post" action="/merchants/view/add-credit/{{ merchant.mtb_id }}/" enctype="multipart/form-data">
  {% csrf_token %}

  <div class="mb-13 text-center">
    <h1 class="mb-3">Add Credit</h1>
    <div class="text-muted fw-semibold fs-5">Credit amount will be subtracted from the balance.</div>
  </div>

  <!-- CREDIT INPUT -->
  <div class="d-flex flex-column mb-8 fv-row">
    <label class="d-flex align-items-center fs-6 fw-semibold mb-2">
      <span class="required">Credit</span>
    </label>
    <input type="number" class="form-control form-control-solid" name="credit" required />
  </div>
  <!-- DATE INPUT -->
  <div class="d-flex flex-column mb-8 fv-row">
    <label class="d-flex align-items-center fs-6 fw-semibold mb-2">
      <span class="required">Date</span>
    </label>
    <input type="date" class="form-control form-control-solid" name="date" required />
  </div>

  <!-- PAYMENT SOURCE BOX -->
  <div class="p-4 rounded border mb-8" style="background:#e8f9ee;border:1px solid #c4eed3;">
    <h4 class="fw-bold mb-4" style="color:#14532d; display:flex; align-items:center; gap:8px;">
      <i class="fa fa-credit-card" style="color:#16a34a;"></i>
      Payment Source
    </h4>

    <div class="mb-5">
      <label class="fs-6 fw-semibold mb-2">Payment Method</label>
      <input 
        type="text" 
        name="payment_method" 
        class="form-control form-control-solid" 
        placeholder="e.g., Cash, Bank Transfer, Easypaisa, JazzCash" 
      />
    </div>

    <div class="mb-5">
      <label class="fs-6 fw-semibold mb-2">Payment Reference / Txn ID</label>
      <input 
        type="text" 
        name="payment_reference" 
        class="form-control form-control-solid" 
        placeholder="Txn ID / Slip No / Ref No" 
      />
    </div>

    <div class="mb-5">
      <label class="fs-6 fw-semibold mb-2">Received To</label>
      <input 
        type="text" 
        name="payment_to" 
        class="form-control form-control-solid" 
        placeholder="Receiver Name / Account" 
        value="{{ merchant.first_name }} {{ merchant.last_name }}"
      />
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="text-center">
    <button type="reset" id="kt_modal_new_target_cancel" class="btn btn-light me-3" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" id="kt_modal_new_target_submit" class="btn btn-primary">
      <span class="indicator-label">Add</span>
      <span class="indicator-progress">
        Please wait...
        <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
      </span>
    </button>
  </div>
</form>

        <!-- end:Form -->
      </div>
      <!-- end::Modal body -->
    </div>
    <!-- end::Modal content -->
  </div>
  <!-- end::Modal dialog -->
</div>
<!-- end::Modal - New Target -->
