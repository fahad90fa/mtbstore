<!-- begin::Modal - New Target -->
<div class="modal fade" id="kt_modal_add_Alert" tabindex="-1" aria-hidden="true">
  <!-- begin::Modal dialog -->
  <div class="modal-dialog modal-dialog-centered mw-650px">
    <!-- begin::Modal content -->
    <div class="modal-content rounded">
      <!-- begin::Modal header -->
      <div class="modal-header pb-0 border-0 justify-content-end">
        <!-- begin::Close -->
        <div class="btn btn-sm btn-icon btn-active-color-primary" data-bs-dismiss="modal">
          <i class="ki-duotone ki-cross fs-1">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
        </div>
        <!-- end::Close -->
      </div>
      <!-- begin::Modal header -->
      <!-- begin::Modal body -->
      <div class="modal-body scroll-y px-10 px-lg-15 pt-0 pb-15">
        <!-- begin:Form -->
        <form id="kt_modal_new_alert_form" class="form" method="post" action="/merchants/alerts/{{ merchant.mtb_id }}/">
          {% csrf_token %}
          <!-- begin::Heading -->
          <div class="mb-13 text-center">
            <!-- begin::Title -->
            <h1 class="mb-3">Add Alert</h1>
            <!-- end::Title -->
            <!-- begin::Description -->
            <div class="text-muted fw-semibold fs-5">Fill in the alert details below. This information will be visible only to administrators.</div>
            <!-- end::Description -->
          </div>
          <!-- end::Heading -->

    

          <!-- begin::Input group for alert text -->
          <div class="d-flex flex-column mb-8">
            <label class="fs-6 fw-semibold mb-2">Alert Message</label>
            <textarea class="form-control form-control-solid" rows="3" name="text" maxlength="500" placeholder="Describe the alert message" required></textarea>
          </div>
          <!-- end::Input group for alert text -->

          <!-- begin::Input group for expiration datetime -->
          <div class="fv-row mb-10">
            <label class="form-label">Trigger Time</label>
            <input type="datetime-local" class="form-control form-control-solid" name="expiration_datetime" />
          </div>
          <!-- end::Input group for expiration datetime -->

          <!-- begin::Actions -->
          <div class="text-center">
            <button type="reset" id="kt_modal_new_alert_cancel" class="btn btn-light me-3" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" id="kt_modal_new_alert_submit" class="btn btn-primary">
              <span class="indicator-label">Submit</span>
              <span class="indicator-progress">
                Please wait...
                <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
              </span>
            </button>
          </div>
          <!-- end::Actions -->
        </form>
        <!-- end:Form -->
      </div>
      <!-- end::Modal body -->
    </div>
    <!-- end::Modal content -->
  </div>
  <!-- end::Modal dialog -->
</div>
<!-- end::Modal - New Target -->
