<!-- begin::Modal - New Target -->
<div class="modal fade" id="kt_modal_new_category" tabindex="-1" aria-hidden="true">
  <!-- begin::Modal dialog -->
  <div class="modal-dialog modal-dialog-centered mw-650px">
    <!-- begin::Modal content -->
    <div class="modal-content rounded">
      <!-- begin::Modal header -->
      <div class="modal-header pb-0 border-0 justify-content-end">
        <!-- begin::Close -->
        <div class="btn btn-sm btn-icon btn-active-color-primary" data-bs-dismiss="modal">
          <i class="ki-duotone ki-cross fs-1">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
        </div>
        <!-- end::Close -->
      </div>
      <!-- begin::Modal header -->
      <!-- begin::Modal body -->
      <div class="modal-body scroll-y px-10 px-lg-15 pt-0 pb-15">
        <!-- begin:Form -->
        <form id="kt_modal_new_target_form" class="form" method="post" action="/inventory/add-category/" enctype="multipart/form-data">
          {% csrf_token %}
          <!-- begin::Heading -->
          <div class="mb-13 text-center">
            <!-- begin::Title -->
            <h1 class="mb-3">Add Category</h1>
            <!-- end::Title -->
            <!-- begin::Description -->
            <div class="text-muted fw-semibold fs-5">Fill in the category details below. This information will be visible only to administrators.</div>
            <!-- end::Description -->
          </div>
          <!-- end::Heading -->
          <!-- begin::Input group -->
          <div class="d-flex flex-column mb-8 fv-row">
            <!-- begin::Label -->
            <label class="d-flex align-items-center fs-6 fw-semibold mb-2">
              <span class="required">Category Title</span>
              <span class="ms-1" data-bs-toggle="tooltip" title="Keep it short (1–2 words) for a professional look.">
                <i class="ki-duotone ki-information-5 text-gray-500 fs-6">
                  <span class="path1"></span>
                  <span class="path2"></span>
                  <span class="path3"></span>
                </i>
              </span>
            </label>
            <!-- end::Label -->
            <input type="text" class="form-control form-control-solid" placeholder="Enter Category Title" maxlength="25" name="title" required />
          </div>
          <!-- end::Input group -->
          <div class="fv-row mb-10">
            <label class="form-label required">Category Image</label>
            <input name="img" type="file" accept="image/*" class="form-control form-control-lg form-control-solid" />
          </div>

          <!-- begin::Input group -->
          <div class="fv-row mb-10">
            <label class="form-label required">Select Template</label>
            <select name="tem_id"  id="templateSelect" class="form-select form-control-lg form-control-solid" required>
            </select>
          </div>
          <!-- end::Input group -->

          <div class="fv-row mb-10">
            <label class="form-label required">Status</label>
            <select name="status" class="form-select form-control-lg form-control-solid" required>
              <option value="inactive">In-active</option>
              <option value="active">Active</option>
            </select>
          </div>

          <!-- begin::Input group -->
          <div class="d-flex flex-column mb-8">
            <label class="fs-6 fw-semibold mb-2">Description</label>
            <textarea class="form-control form-control-solid" rows="3" name="description" maxlength="50" placeholder="Describe Category"></textarea>
          </div>
          <!-- end::Input group -->
          <!-- begin::Actions -->
          <div class="text-center">
            <button type="reset" id="kt_modal_new_target_cancel" class="btn btn-light me-3" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" id="kt_modal_new_target_submit" class="btn btn-primary">
              <span class="indicator-label">Submit</span>
              <span class="indicator-progress">
                Please wait...
                <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
              </span>
            </button>
          </div>
          <!-- end::Actions -->
        </form>
        <!-- end:Form -->
      </div>
      <!-- end::Modal body -->
    </div>
    <!-- end::Modal content -->
  </div>
  <!-- end::Modal dialog -->
</div>
<!-- end::Modal - New Target -->

<script>
async function loadTemplates(type) {
  const select = document.getElementById("templateSelect");

  // reset
  select.innerHTML = '<option value=""></option>';

  const url = type
    ? `/api/templates/?type=${encodeURIComponent(type)}`
    : `/api/templates/`;

  const res = await fetch(url);
  const templates = await res.json();

  templates.forEach(t => {
    const option = document.createElement("option");
    option.value = t.tem_id;
    option.textContent = t.template_name || "Unnamed Template";
    select.appendChild(option);
  });

  // re-init select2 if already loaded
  if (window.jQuery && $(select).data("select2")) {
    $(select).trigger("change");
  }
}
document.addEventListener("DOMContentLoaded", function () {
  loadTemplates("template");
});
</script>
